<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media App</title>
    <style>
        :root { --blue: #1877f2; --bg: #f0f2f5; }
        body { background: var(--bg); font-family: Arial; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .nav { background: var(--blue); color: #fff; width: 100%; padding: 15px 0; text-align: center; font-weight: bold; }
        .container { width: 90%; max-width: 450px; margin-top: 20px; }
        .card { background: #fff; border-radius: 8px; padding: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); margin-bottom: 15px; }
        textarea { width: 100%; border: none; font-size: 16px; outline: none; min-height: 80px; font-family: inherit; }
        .btn { width: 100%; background: var(--blue); color: #fff; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
        .modal { background: #fff; width: 80%; max-width: 350px; padding: 20px; border-radius: 10px; text-align: center; }
        .modal h2 { color: #d00; }
        .flex { display: flex; gap: 10px; margin-top: 15px; }
        .c-btn { background: #eee; border: none; flex: 1; padding: 10px; border-radius: 5px; cursor: pointer; }
        .p-btn { background: #d00; color: #fff; border: none; flex: 1; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="nav">My Social App</div>

    <div class="container">
        <div class="card">
            <div style="font-weight:bold; margin-bottom:10px;">Era Mae Dayondon</div>
            <textarea id="txt" placeholder="What's on your mind?"></textarea>
            <button class="btn" onclick="send()">Post</button>
        </div>

        <div class="card" style="opacity: 0.8;">
            <div style="font-weight:bold; color: #555;">System Message</div>
            <p style="font-size: 14px; color: #666;">Welcome! Try typing something judgmental like "hate" or "stupid" to see the reminder in action.</p>
        </div>
    </div>

    <div id="pop" class="overlay">
        <div class="modal">
            <h2>Warning!</h2>
            <p>"Think before you judge. You don't know the full story of someone's life or behavior."</p>
            <div class="flex">
                <button class="c-btn" onclick="hide()">Edit</button>
                <button class="p-btn" onclick="postNow()">Post anyway</button>
            </div>
        </div>
    </div>

    <script>
        let input = document.getElementById('txt');
        let pop = document.getElementById('pop');
        let bad = ['hate', 'stupid', 'ugly', 'fake', 'loser', 'trash', 'bad', 'wrong'];

        function send() {
            let str = input.value.toLowerCase();
            if (str.trim() == "") return alert("Field is empty!");

            let found = false;
            for(let i=0; i < bad.length; i++) {
                if(str.includes(bad[i])) {
                    found = true;
                    break;
                }
            }

            if (found) {
                pop.style.display = 'flex';
            } else {
                alert("Posted successfully!");
                input.value = "";
            }
        }

        function hide() {
            pop.style.display = 'none';
        }

        function postNow() {
            hide();
            alert("Post shared.");
            input.value = "";
        }
    </script>
</body>
</html>
