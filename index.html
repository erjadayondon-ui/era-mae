<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="manifest.json" />
    <title>FullStory Social</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <style>
      :root {
        --blue: #1877f2;
        --bg: #f0f2f5;
        --gray: #65676b;
      }
      body {
        background: var(--bg);
        font-family: Helvetica, Arial, sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .nav {
        background: var(--blue);
        color: #fff;
        width: 100%;
        padding: 12px 0;
        text-align: center;
        font-weight: bold;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .container {
        width: 95%;
        max-width: 500px;
        margin-top: 15px;
      }
      .card {
        background: #fff;
        border-radius: 8px;
        padding: 12px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        margin-bottom: 15px;
      }
      .user {
        font-weight: bold;
        font-size: 14px;
        margin-bottom: 5px;
      }
      textarea {
        width: 100%;
        border: none;
        font-size: 16px;
        outline: none;
        min-height: 50px;
        font-family: inherit;
        resize: none;
      }
      .btn {
        width: 100%;
        background: var(--blue);
        color: #fff;
        border: none;
        padding: 8px;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
      }
      .p-txt {
        font-size: 15px;
        margin: 10px 0;
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
      }
      .acts {
        display: flex;
        justify-content: space-around;
      }
      .a-btn {
        background: none;
        border: none;
        color: var(--gray);
        font-weight: bold;
        cursor: pointer;
        font-size: 13px;
        flex: 1;
        padding: 8px;
      }
      .a-btn i {
        margin-right: 5px;
      }
      .a-btn:hover {
        background: #f2f2f2;
        border-radius: 4px;
      }
      .blue-i {
        color: var(--blue);
      }
      .red-i {
        color: #e41e3f;
      }
      .mng {
        text-align: right;
        margin-top: 5px;
      }
      .m-btn {
        background: none;
        border: none;
        font-size: 11px;
        cursor: pointer;
        color: var(--gray);
        margin-left: 10px;
      }
      .overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        z-index: 100;
        justify-content: center;
        align-items: center;
      }
      .modal {
        background: #fff;
        width: 85%;
        max-width: 350px;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
      }
      .flex {
        display: flex;
        gap: 10px;
        margin-top: 15px;
      }
      .c-btn {
        background: #eee;
        border: none;
        flex: 1;
        padding: 10px;
        border-radius: 5px;
        cursor: pointer;
      }
      .p-btn {
        background: #d00;
        color: #fff;
        border: none;
        flex: 1;
        padding: 10px;
        border-radius: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="nav">FullStory Social</div>

    <div class="container">
      <div class="card">
        <div class="user">Era Mae Dayondon</div>
        <textarea id="txt" placeholder="What's on your mind?"></textarea>
        <button id="mainBtn" class="btn" onclick="send()">Post</button>
      </div>
      <div id="feed"></div>
    </div>

    <div id="pop" class="overlay">
      <div class="modal">
        <h2 style="color: red; margin: 0">Wait!</h2>
        <p>
          "Think before you judge. You don't know the full story of someone's
          life."
        </p>
        <div class="flex">
          <button class="c-btn" onclick="hide()">Edit</button>
          <button class="p-btn" onclick="force()">Post anyway</button>
        </div>
      </div>
    </div>

    <script>
      let input = document.getElementById("txt");
      let pop = document.getElementById("pop");
      let feed = document.getElementById("feed");
      let bad = ["hate", "stupid", "ugly", "fake", "loser", "trash", "bad"];
      let db = JSON.parse(localStorage.getItem("posts")) || [];
      let editIdx = -1;

      function show() {
        feed.innerHTML = "";
        db.forEach((item, i) => {
          feed.innerHTML += `
                    <div class="card">
                        <div class="user">User <span style="font-weight:normal; color:#65676b">• Just now</span></div>
                        <div class="p-txt">${item.text}</div>
                        <div class="acts">
                            <button class="a-btn" onclick="react(${i}, 'likes')">
                                <i class="fa-regular fa-thumbs-up ${item.likes > 0 ? "blue-i" : ""}"></i> Like ${item.likes || ""}
                            </button>
                            <button class="a-btn" onclick="react(${i}, 'hearts')">
                                <i class="fa-regular fa-heart ${item.hearts > 0 ? "red-i" : ""}"></i> Love ${item.hearts || ""}
                            </button>
                        </div>
                        <div class="mng">
                            <button class="m-btn" onclick="prepEdit(${i})">Edit</button>
                            <button class="m-btn" onclick="del(${i})" style="color:red">Delete</button>
                        </div>
                    </div>`;
        });
      }

      function send() {
        let val = input.value;
        if (!val.trim()) return;
        if (bad.some((w) => val.toLowerCase().includes(w))) {
          pop.style.display = "flex";
        } else {
          save();
        }
      }

      function save() {
        if (editIdx > -1) {
          db[editIdx].text = input.value;
          editIdx = -1;
          document.getElementById("mainBtn").innerText = "Post";
        } else {
          db.push({ text: input.value, likes: 0, hearts: 0 });
        }
        update();
      }

      function react(i, type) {
        db[i][type] = (db[i][type] || 0) + 1;
        update();
      }

      function del(i) {
        db.splice(i, 1);
        update();
      }

      function prepEdit(i) {
        input.value = db[i].text;
        editIdx = i;
        document.getElementById("mainBtn").innerText = "Update Post";
        window.scrollTo(0, 0);
      }

      function update() {
        localStorage.setItem("posts", JSON.stringify(db));
        input.value = "";
        show();
      }

      function force() {
        hide();
        save();
      }
      function hide() {
        pop.style.display = "none";
      }

      show();

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/service-worker.js")
          .then(() => {
            console.log("ayos! rehistro as service worker");
          })
          .catch((error) => {
            console.log("Registration failed: ", error);
          });
      }
    </script>
  </body>
</html>
